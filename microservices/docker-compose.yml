services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: riyo_users
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    environment:
      - PORT=8081
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASS=postgres
      - DB_NAME=riyo_users
    depends_on:
      - postgres
    ports:
      - "8081:8081"

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    environment:
      - PORT=8080
      - USER_SERVICE_URL=http://user-service:8081
      - FIREBASE_CREDS_FILE=/app/firebase-creds.json
    depends_on:
      - user-service
    ports:
      - "8080:8080"

volumes:
  postgres_data:
