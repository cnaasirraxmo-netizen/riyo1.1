
name: riyo
description: "A new Flutter project."
publish_to: 'none' 
version: 3.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.3
  provider: ^6.1.5+1
  go_router: ^14.2.0
  transparent_image: ^2.0.1
  cached_network_image: ^3.4.1
  screen_brightness: ^2.1.7
  wakelock_plus: ^1.4.0
  flutter_volume_controller: ^1.3.4
  flutter_svg: ^2.0.10+1
  http: ^1.2.1
  dio: ^5.4.1
  file_picker: ^8.0.3
  path_provider: ^2.1.5
  path: ^1.9.0
  carousel_slider: ^5.1.1
  shimmer: ^3.0.0
  flutter_chrome_cast: 1.3.0
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.1
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  flutter_local_notifications: ^20.1.0
  flutter_riverpod: ^3.2.1
  media_cast_dlna: ^0.2.0
  ffi: ^2.2.0
  dynamic_color: ^1.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/logo.png"
  min_sdk_android: 21 # android >= 5.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
